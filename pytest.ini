[pytest]
# Configuración de Pytest para Cyber-Inventory

# Ruta a archivos de test
testpaths = tests

# Patrón de descubrimiento de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Marcadores personalizados
markers =
    unit: Tests unitarios
    integration: Tests de integración
    parametrize: Tests parametrizados
    slow: Tests lentos
    edge_case: Tests de casos límite

# Timeout para tests (segundos)
timeout = 10

# Mostrar mensajes print en output
log_cli = false
log_cli_level = INFO

# Reporte
junit_family = xunit2
